name: FastDNS CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Check: static analysis only, no tests ───────────────────────
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  # ── Build + Test (Linux) ────────────────────────────────────────
  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build (all features)
        run: cargo build --release --all-features

      - name: Run unit tests
        run: cargo test --all-features

      - name: Verify binary
        run: |
          ./target/release/fastdns --help
          file ./target/release/fastdns
          ls -lh ./target/release/fastdns

  # ── Build + Test (macOS) ────────────────────────────────────────
  test-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (all features)
        run: cargo build --release --all-features

      - name: Run unit tests
        run: cargo test --all-features

  # ── Security Audit ──────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true  # Non bloccante: segnala vulnerabilità ma non blocca il CI
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2026-0185

  # ── Build Release Artifacts ─────────────────────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --all-features

      - name: Strip binary
        run: strip target/release/fastdns

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-linux-x86_64
          path: target/release/fastdns
          retention-days: 30

  # ── Docker Build ────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fastdns:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
