name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Linux x86_64 ────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - run: strip target/x86_64-unknown-linux-gnu/release/fastdns
      - uses: actions/upload-artifact@v4
        with:
          name: fastdns-linux-x86_64
          path: target/x86_64-unknown-linux-gnu/release/fastdns
          retention-days: 7

  # ── macOS Universal (Intel + ARM64 in unico job) ────────────────
  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build x86_64 (Intel)
        run: cargo build --release --target x86_64-apple-darwin
      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Create universal fat binary
        run: |
          mkdir -p /tmp/fastdns-universal
          lipo -create -output /tmp/fastdns-universal/fastdns \
            target/x86_64-apple-darwin/release/fastdns \
            target/aarch64-apple-darwin/release/fastdns
          echo "=== Binary info ==="
          file /tmp/fastdns-universal/fastdns
          lipo -info /tmp/fastdns-universal/fastdns
      - uses: actions/upload-artifact@v4
        with:
          name: fastdns-macos-universal
          path: /tmp/fastdns-universal/fastdns
          retention-days: 7

  # ── Windows x86_64 ──────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: fastdns-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/fastdns.exe
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/release-artifacts
      - name: Assemble release assets
        run: |
          mkdir -p /tmp/upload
          cp /tmp/release-artifacts/fastdns-linux-x86_64/fastdns /tmp/upload/fastdns-linux-x86_64
          chmod +x /tmp/upload/fastdns-linux-x86_64
          cp /tmp/release-artifacts/fastdns-macos-universal/fastdns /tmp/upload/fastdns-macos-universal
          chmod +x /tmp/upload/fastdns-macos-universal
          cp /tmp/release-artifacts/fastdns-windows-x86_64/fastdns.exe /tmp/upload/fastdns-windows-x86_64.exe
          ls -lh /tmp/upload/
          file /tmp/upload/*
      - uses: softprops/action-gh-release@v2
        with:
          name: FastDNS ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            /tmp/upload/fastdns-linux-x86_64
            /tmp/upload/fastdns-macos-universal
            /tmp/upload/fastdns-windows-x86_64.exe
          body: |
            ## 🚀 FastDNS ${{ github.ref_name }}

            ### Downloads
            - **Linux (x86_64)**: `fastdns-linux-x86_64`
            - **macOS (Universal Intel+ARM)**: `fastdns-macos-universal`
            - **Windows (x86_64)**: `fastdns-windows-x86_64.exe`

            ### Installazione macOS
            ```bash
            chmod +x fastdns-macos-universal
            sudo cp fastdns-macos-universal /usr/local/bin/fastdns
            sudo /usr/local/bin/fastdns --install-service
            ```

            ### Installazione Linux
            ```bash
            chmod +x fastdns-linux-x86_64
            sudo cp fastdns-linux-x86_64 /usr/local/bin/fastdns
            sudo /usr/local/bin/fastdns -b 127.0.0.1:53
            ```

            ### Installazione Windows (PowerShell Admin)
            ```powershell
            ren fastdns-windows-x86_64.exe fastdns.exe
            .\fastdns.exe --install-service
            ```
